// ══ SPEECH (降级: 检测TTS可用性) ══
var ttsOK = 'speechSynthesis' in window;
function speak(t,l){if(!ttsOK)return;try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang=l;u.rate=0.85;speechSynthesis.speak(u)}catch(e){}}
function speakBoth(e,z){if(!ttsOK)return;try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(e);u.lang='en-US';u.rate=0.8;u.onend=function(){setTimeout(function(){var v=new SpeechSynthesisUtterance(z);v.lang='zh-CN';v.rate=0.85;speechSynthesis.speak(v)},400)};speechSynthesis.speak(u)}catch(e){}}

// ══ CATEGORIES ══
var activeCat='all';
var catBar=document.getElementById('catBar');
var catKeys=Object.keys(CAT_LABELS);
for(var ci=0;ci<catKeys.length;ci++){
  (function(k){
    var btn=document.createElement('button');
    btn.className='cat-tag'+(k==='all'?' active':'');
    btn.textContent=CAT_LABELS[k];
    btn.onclick=function(){
      activeCat=k;
      var tags=document.querySelectorAll('.cat-tag');
      for(var t=0;t<tags.length;t++){tags[t].className='cat-tag'}
      btn.className='cat-tag active';
      renderGrid();
    };
    catBar.appendChild(btn);
  })(catKeys[ci]);
}

// ══ LAZY LOAD (IntersectionObserver 降级) ══
var hasIO = 'IntersectionObserver' in window;
var observer = null;
if(hasIO){
  observer = new IntersectionObserver(function(entries){
    for(var i=0;i<entries.length;i++){
      if(entries[i].isIntersecting){
        var el=entries[i].target;
        var svg=el.getAttribute('data-svg');
        if(svg){
          el.innerHTML=svg;
          el.removeAttribute('data-svg');
          el.className='card-img-inner loaded';
        }
        observer.unobserve(el);
      }
    }
  },{rootMargin:'200px 0px'});
}

// ══ GRID (分批渲染 + 懒加载) ══
var grid=document.getElementById('grid');
function renderGrid(){
  grid.innerHTML='';
  var filtered=[];
  for(var i=0;i<cards.length;i++){
    if(activeCat==='all'||cards[i].cat===activeCat) filtered.push(cards[i]);
  }
  // 分批渲染: 先渲染前12张，其余requestIdleCallback/setTimeout分批
  var BATCH1=12;
  renderBatch(filtered,0,Math.min(BATCH1,filtered.length));
  if(filtered.length>BATCH1){
    var pos=BATCH1;
    var BATCH=8;
    function nextBatch(){
      if(pos>=filtered.length)return;
      var end=Math.min(pos+BATCH,filtered.length);
      renderBatch(filtered,pos,end);
      pos=end;
      if(pos<filtered.length){
        if(window.requestIdleCallback) requestIdleCallback(nextBatch);
        else setTimeout(nextBatch,16);
      }
    }
    if(window.requestIdleCallback) requestIdleCallback(nextBatch);
    else setTimeout(nextBatch,50);
  }
}

function renderBatch(arr,start,end){
  var frag=document.createDocumentFragment();
  for(var i=start;i<end;i++){
    var c=arr[i];
    var wrap=document.createElement('div');
    wrap.className='card-wrap';

    var d=document.createElement('article');
    d.className='card';

    // 卡片图片区域
    var imgDiv=document.createElement('div');
    imgDiv.className='card-img';

    var inner=document.createElement('div');
    // 前12张直接渲染，其余懒加载
    if(i<12||!hasIO){
      inner.className='card-img-inner loaded';
      inner.innerHTML=c.svg;
    } else {
      inner.className='card-img-inner lazy';
      inner.setAttribute('data-svg',c.svg);
    }
    imgDiv.appendChild(inner);

    // 卡片信息区域 (用字符串拼接减少DOM操作)
    var info=document.createElement('div');
    info.className='card-info';
    info.innerHTML='<div class="card-en">'+c.en+'</div><div class="card-zh">'+c.zh+'</div><div class="card-btns"><button class="card-btn" data-en="'+c.en+'" data-action="en">🔊EN</button><button class="card-btn" data-zh="'+c.zh+'" data-action="zh">🔊中</button></div>';

    d.appendChild(imgDiv);
    d.appendChild(info);
    wrap.appendChild(d);
    frag.appendChild(wrap);

    // 懒加载观察
    if(i>=12&&hasIO&&observer){
      observer.observe(inner);
    }
  }
  grid.appendChild(frag);
}

// 事件委托 (替代每个按钮单独绑定，减少内存)
grid.addEventListener('click',function(e){
  var btn=e.target;
  if(btn.classList&&btn.classList.contains('card-btn')){
    e.stopPropagation();
    var action=btn.getAttribute('data-action');
    if(action==='en') speak(btn.getAttribute('data-en'),'en-US');
    if(action==='zh') speak(btn.getAttribute('data-zh'),'zh-CN');
    return;
  }
  // 点击卡片本身 → 朗读双语
  var card=btn;
  while(card&&!card.classList.contains('card')){card=card.parentElement}
  if(card){
    var en=card.querySelector('.card-en');
    var zh=card.querySelector('.card-zh');
    if(en&&zh) speakBoth(en.textContent,zh.textContent);
  }
});

renderGrid();

// ══ SLIDESHOW ══
var slideOrder=[],slideIdx=0,slideTimer=null,paused=false,DUR=8000;
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function getSlideCards(){
  if(activeCat==='all')return cards;
  var r=[];for(var i=0;i<cards.length;i++){if(cards[i].cat===activeCat)r.push(cards[i])}return r;
}
function openSlideshow(seq){
  var pool=getSlideCards();
  var indices=[];for(var i=0;i<pool.length;i++)indices.push(i);
  slideOrder=seq?indices:shuffle(indices);
  slideIdx=0;paused=false;
  document.getElementById('pauseBtn').textContent='⏸';
  document.getElementById('slideOverlay').className='slide-overlay active';
  document.body.style.overflow='hidden';
  showSlide(pool);
}
function closeSlide(){
  document.getElementById('slideOverlay').className='slide-overlay';
  document.body.style.overflow='';
  clearTimeout(slideTimer);
  if(ttsOK)try{speechSynthesis.cancel()}catch(e){}
}
function showSlide(pool){
  pool=pool||getSlideCards();
  clearTimeout(slideTimer);
  var c=pool[slideOrder[slideIdx]];
  document.getElementById('slideImg').innerHTML=c.svg;
  document.getElementById('slideEn').textContent=c.en;
  document.getElementById('slideZh').textContent=c.zh;
  document.getElementById('slideCounter').textContent=(slideIdx+1)+' / '+slideOrder.length;
  var bar=document.getElementById('progressBar');
  bar.style.transition='none';bar.style.width='0%';
  speakBoth(c.en,c.zh);
  if(!paused){
    setTimeout(function(){bar.style.transition='width '+DUR+'ms linear';bar.style.width='100%'},20);
    slideTimer=setTimeout(function(){slideIdx=(slideIdx+1)%slideOrder.length;showSlide(pool)},DUR);
  }
}
function slideNext(){var p=getSlideCards();slideIdx=(slideIdx+1)%slideOrder.length;showSlide(p)}
function slidePrev(){var p=getSlideCards();slideIdx=(slideIdx-1+slideOrder.length)%slideOrder.length;showSlide(p)}
function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';if(!paused)showSlide();else{clearTimeout(slideTimer);var b=document.getElementById('progressBar');b.style.transition='none'}}
function speakCur(l){var pool=getSlideCards();var c=pool[slideOrder[slideIdx]];l==='en'?speak(c.en,'en-US'):speak(c.zh,'zh-CN')}

// ══ KEYBOARD ══
document.addEventListener('keydown',function(e){
  if(document.getElementById('slideOverlay').className.indexOf('active')===-1)return;
  if(e.key==='ArrowRight'||e.keyCode===39)slideNext();
  if(e.key==='ArrowLeft'||e.keyCode===37)slidePrev();
  if(e.key===' '||e.keyCode===32){e.preventDefault();togglePause()}
  if(e.key==='Escape'||e.keyCode===27)closeSlide();
});

// ══ TOUCH ══
var tx=0;var so=document.getElementById('slideOverlay');
so.addEventListener('touchstart',function(e){tx=e.touches[0].clientX},{passive:true});
so.addEventListener('touchend',function(e){var d=e.changedTouches[0].clientX-tx;if(d>50)slidePrev();else if(d<-50)slideNext()},{passive:true});
</script>
</body>
</html>
